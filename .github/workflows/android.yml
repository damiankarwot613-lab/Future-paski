name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential \
        git \
        zip \
        unzip \
        openjdk-17-jdk \
        autoconf \
        libtool \
        pkg-config \
        zlib1g-dev \
        libncurses5-dev \
        libncursesw5-dev \
        libtinfo5 \
        cmake \
        libffi-dev \
        libssl-dev

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install Buildozer
      run: |
        pip install buildozer
        pip install cython==0.29.33

    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Build APK
      run: |
        buildozer android release

    - name: Show build outputs
      run: |
        echo "Searching for APK/AAB files..."
        find . -name "*.apk"
        find . -name "*.aab"

    - name: Upload APK and AAB
      uses: actions/upload-artifact@v4
      with:
        name: paskifuture-build
        path: |
          **/*.apk
          **/*.aab
