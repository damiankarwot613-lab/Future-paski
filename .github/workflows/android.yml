name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          zip unzip \
          openjdk-17-jdk \
          autoconf automake \
          libtool \
          libtool-bin \
          libltdl-dev \
          build-essential \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libffi-dev \
          libssl-dev

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Buildozer
        run: |
          pip install buildozer
          pip install "cython<3"

      - name: Accept Android licenses
        run: |
          yes | buildozer android update

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: |
            **/*.apk
            **/*.aab
